<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mensagens WeTransfer - ENGESAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/Treco_Engesat.png" onerror="this.remove()" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-4 sm:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-slate-200">
        
        <!-- Left Panel: Form Controls -->
        <div class="w-full md:w-5/12 bg-slate-50 p-6 sm:p-8 border-r border-slate-200 flex flex-col gap-6 overflow-y-auto" style="max-height: 90vh;">
            
            <div>
                <h1 class="text-2xl font-bold text-slate-900 mb-1">Gerador WeTransfer</h1>
                <p class="text-sm text-slate-500">Preencha os dados abaixo para gerar a mensagem padrão.</p>
            </div>

            <!-- Tipo de Envio -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700">Tipo de Envio</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" id="btn-type-img" class="type-btn active py-2 px-3 text-sm font-medium rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-700 transition-colors" onclick="setType('img')">Imagem</button>
                    <button type="button" id="btn-type-alt" class="type-btn py-2 px-3 text-sm font-medium rounded-lg border-2 border-transparent bg-white shadow-sm text-slate-600 hover:bg-slate-100 transition-colors" onclick="setType('alt')">Altimetria</button>
                    <button type="button" id="btn-type-combo" class="type-btn py-2 px-3 text-sm font-medium rounded-lg border-2 border-transparent bg-white shadow-sm text-slate-600 hover:bg-slate-100 transition-colors" onclick="setType('combo')">Combo</button>
                </div>
            </div>

            <!-- Bloco Altimetria (Oculto por padrão) -->
            <div id="block-altimetry" class="hidden flex-col gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Dados Altimétricos</h3>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Produto</label>
                    <select id="alt-product" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="WorldDEM Neo">WorldDEM Neo (5m)</option>
                        <option value="WorldDEM">WorldDEM (12m)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Modelos Incluídos</label>
                    <select id="alt-model" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="MDS e MDT">MDS e MDT</option>
                        <option value="MDT">Apenas MDT</option>
                        <option value="MDS">Apenas MDS</option>
                    </select>
                </div>
            </div>

            <!-- Bloco Imagem -->
            <div id="block-image" class="flex flex-col gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Dados de Imagem</h3>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Satélite</label>
                    <select id="img-satellite" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none" onchange="updateResolutionDropdown()">
                        <!-- Preenchido via JS -->
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Resolução</label>
                        <select id="img-resolution" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <!-- Preenchido via JS baseado no satélite -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Data da Imagem</label>
                        <input type="date" id="img-date" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <!-- Bloco Comum: Projeção -->
            <div class="flex flex-col gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Projeção (Comum)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Fuso UTM</label>
                        <input type="number" id="utm-zone" min="17" max="25" value="23" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Hemisfério</label>
                        <select id="utm-hemi" class="w-full rounded-lg border-slate-300 border p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Sul">Sul (S)</option>
                            <option value="Norte">Norte (N)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="generateMessage()" class="mt-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-md hover:shadow-lg active:scale-[0.98]">
                Gerar Mensagem
            </button>
        </div>

        <!-- Right Panel: Output -->
        <div class="w-full md:w-7/12 bg-white p-6 sm:p-8 flex flex-col relative h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">Resultado Final</h2>
                <button onclick="copyToClipboard()" id="copy-btn" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span>Copiar Texto</span>
                </button>
            </div>
            
            <textarea id="output" readonly class="flex-grow w-full bg-slate-50 border border-slate-200 rounded-xl p-5 text-sm font-mono text-slate-700 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500/50 leading-relaxed"></textarea>
            
            <!-- Toast de Cópia -->
            <div id="toast" class="absolute bottom-10 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full font-medium text-sm shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none">
                Mensagem copiada para a área de transferência!
            </div>
        </div>
    </div>

    <script>
        const satelliteData = {
            "Pleiades Neo": { res: ["30 cm"], raw: true },
            "Pleiades": { res: ["50 cm"], raw: true },
            "SPOT 6": { res: ["1,5 m"], raw: true },
            "SPOT 5": { res: ["2,5 m", "5 m", "10 m"], raw: false },
            "SPOT 4": { res: ["10 m"], raw: false },
            "Jilin": { res: ["30 cm", "50 cm", "75 cm"], raw: true },
            "Legion": { res: ["15 cm", "30 cm"], raw: true },
            "WorldView 1": { res: ["50 cm"], raw: true },
            "WorldView 2": { res: ["50 cm"], raw: true },
            "WorldView 3": { res: ["30 cm"], raw: true },
            "WorldView 4": { res: ["30 cm"], raw: true },
            "Kompsat 3A": { res: ["40 cm"], raw: true },
            "Kompsat 3": { res: ["70 cm"], raw: true },
            "Kompsat 2": { res: ["1 m"], raw: true },
            "GeoEye": { res: ["50 cm"], raw: true },
            "QuickBird": { res: ["60 cm"], raw: true },
            "SuperView": { res: ["50 cm"], raw: true },
            "Beijin 3A": { res: ["50 cm"], raw: true },
            "Beijin 3N3": { res: ["30 cm"], raw: true },
            "Eros B": { res: ["70 cm"], raw: true },
            "Planet": { res: ["3 m"], raw: true },
            "Triplesat": { res: ["1 m"], raw: true },
            "SkySat": { res: ["50 cm"], raw: true },
            "RapidEye": { res: ["5 m"], raw: true },
            "Gaofen 2": { res: ["80 cm"], raw: true },
            "Ikonos": { res: ["80 cm"], raw: true },
            "BlackSky": { res: ["80 cm", "1 m"], raw: true },
            "Landsat 8 / 9": { res: ["15 m", "30 m"], raw: false },
            "Landsat 4 / 5 / 7": { res: ["30 m"], raw: false },
            "Sentinel 2": { res: ["10 m"], raw: false }
        };

        let currentType = 'img';

        window.onload = () => {
            const satSelect = document.getElementById('img-satellite');
            for (const sat in satelliteData) {
                const option = document.createElement('option');
                option.value = sat;
                option.textContent = sat;
                satSelect.appendChild(option);
            }
            document.getElementById('img-date').valueAsDate = new Date();
            updateResolutionDropdown();
            generateMessage();
        };

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.className = "type-btn py-2 px-3 text-sm font-medium rounded-lg border-2 border-transparent bg-white shadow-sm text-slate-600 hover:bg-slate-100 transition-colors";
            });
            document.getElementById(`btn-type-${type}`).className = "type-btn active py-2 px-3 text-sm font-medium rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-700 transition-colors";

            const blockImg = document.getElementById('block-image');
            const blockAlt = document.getElementById('block-altimetry');

            if (type === 'img') {
                blockImg.classList.remove('hidden'); blockImg.classList.add('flex');
                blockAlt.classList.add('hidden'); blockAlt.classList.remove('flex');
            } else if (type === 'alt') {
                blockAlt.classList.remove('hidden'); blockAlt.classList.add('flex');
                blockImg.classList.add('hidden'); blockImg.classList.remove('flex');
            } else if (type === 'combo') {
                blockImg.classList.remove('hidden'); blockImg.classList.add('flex');
                blockAlt.classList.remove('hidden'); blockAlt.classList.add('flex');
            }
            generateMessage();
        }

        function updateResolutionDropdown() {
            const sat = document.getElementById('img-satellite').value;
            const resSelect = document.getElementById('img-resolution');
            resSelect.innerHTML = '';
            if (satelliteData[sat]) {
                satelliteData[sat].res.forEach(res => {
                    const option = document.createElement('option');
                    option.value = res;
                    option.textContent = res;
                    resSelect.appendChild(option);
                });
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return "[DATA NÃO INFORMADA]";
            const [year, month, day] = dateStr.split('-');
            return `${day}-${month}-${year}`;
        }

        function generateMessage() {
            const fuso = document.getElementById('utm-zone').value;
            const hemi = document.getElementById('utm-hemi').value;
            const projecao = `UTM ${fuso} ${hemi === 'Sul' ? 'Sul' : 'Norte'} SIRGAS 2000`;
            const altProduct = document.getElementById('alt-product').value;
            const altRes = altProduct.includes('Neo') ? '5m' : '12m';
            const altModel = document.getElementById('alt-model').value;
            const sat = document.getElementById('img-satellite').value;
            const res = document.getElementById('img-resolution').value;
            const dataImg = formatDate(document.getElementById('img-date').value);
            const hasRawData = satelliteData[sat] ? satelliteData[sat].raw : false;

            let msg = `Prezado(a),\n\n`;
            if (currentType === 'img') {
                msg += `Seguem pelo presente os arquivos digitais relativos ao fornecimento de:\n\n`;
                msg += getImagemBlock(sat, res, dataImg, projecao, hasRawData);
            } else if (currentType === 'alt') {
                msg += `Seguem os dados para atender sua demanda:\n\n`;
                msg += getAltimetriaBlock(altProduct, altRes, altModel, projecao);
            } else if (currentType === 'combo') {
                msg += `Seguem os dados para atender sua demanda:\n\n`;
                msg += getAltimetriaBlock(altProduct, altRes, altModel, projecao);
                msg += `\n` + getImagemBlock(sat, res, dataImg, projecao, hasRawData);
            }

            msg += `\npara atender o seu pedido.\n\nAtenciosamente,\n\nLaurent MARTIN\nDiretor\nENGESAT`;
            document.getElementById('output').value = msg;
        }

        function getImagemBlock(sat, res, dataImg, projecao, hasRawData) {
            let block = `- Imagem ${sat}\n`;
            const isPanOnly = (sat === "WorldView 1" || sat === "Eros B");
            
            // Adiciona Modo PSM se NÃO for PAN apenas e for satélite de alta resolução
            if (hasRawData && !isPanOnly && !sat.includes("Landsat") && !sat.includes("Sentinel") && !sat.includes("SPOT 4") && !sat.includes("SPOT 5")) {
                block += `- Modo PSM\n`;
            }

            block += `- ${res} de resolução espacial\n`;
            block += `- Data de ${dataImg}\n`;
            block += `- ${projecao}\n`;
            block += `- Ortoretificada com parâmetros orbitais\n`;
            
            if (isPanOnly) {
                 block += `- 1 banda (Pancromática)\n`;
            } else if (sat.includes("Landsat")) {
                 block += `- Cores naturais 432 ou 3 e 4 bandas\n`;
            } else {
                 block += `- 3 e 4 bandas espectrais\n`;
            }

            block += `- GEOTIF\n`;
            block += `- KMZ\n`;
            block += `- 8 bits\n`;
            
            if (isPanOnly) {
                block += `- Imagem P&B (Pancromática)\n`;
            } else {
                block += `- Cores naturais\n`;
            }

            block += `- Com e sem contraste\n`;

            if (hasRawData) {
                block += `- Dados brutos acompanham\n`;
                block += `- Metadados da imagem original utilizada acompanham\n`;
            } else {
                block += `- Metadados das imagens originais utilizadas acompanham\n`;
            }
            return block;
        }

        function getAltimetriaBlock(produto, resolucao, modelos, projecao) {
            let block = `${produto}\n- Resolução espacial de ${resolucao}\n- ${modelos}\n- GeoTiff 32 bit floating point\n- Nuvem de pontos .las e .txt\n\n- Curvas de nível\n- 2 m de equidistância\n- shp, dwg e kml\n\n- ${projecao}\n- Sirgas 2000\n`;
            return block;
        }

        function copyToClipboard() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            const toast = document.getElementById('toast');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2500);
        }
    </script>
</body>
</html>
